<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Drive - UAS Cloud Technology</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
</head>
<body class="bg-[#F8F9FA] font-sans text-gray-700 h-screen flex flex-col overflow-hidden">

    <header class="bg-white border-b border-gray-200 px-4 py-2 flex items-center justify-between z-10">
        <div class="flex items-center gap-2 w-1/4">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" class="w-8 h-8" alt="Drive Logo">
            <span class="text-xl font-medium text-gray-600">Drive</span>
        </div>
        
        <div class="flex-1 flex justify-center">
            <div class="w-full max-w-2xl relative">
                <span class="material-icons-outlined absolute left-3 top-2.5 text-gray-400">search</span>
                <input type="text" id="searchInput" oninput="handleSearch(this.value)" placeholder="Telusuri di Drive" 
                       class="w-full bg-[#F1F3F4] focus:bg-white focus:shadow-md border border-transparent focus:border-gray-200 pl-12 pr-4 py-2 rounded-full text-base outline-none transition-all">
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        
        <aside class="w-64 px-4 py-4 flex flex-col gap-4 bg-white border-r border-gray-100">
            <div class="relative">
                <button onclick="toggleNewMenu()" class="flex items-center gap-3 bg-white hover:bg-gray-50 text-gray-700 px-6 py-4 rounded-2xl shadow-md hover:shadow-lg border border-gray-200 transition font-medium text-sm">
                    <span class="material-icons-outlined text-2xl text-blue-600">add</span> Baru
                </button>
                <div id="newMenuDropdown" class="hidden absolute left-0 mt-2 w-56 bg-white border border-gray-200 rounded-lg shadow-xl py-2 z-20">
                    <button onclick="triggerCreateFolder()" class="w-full text-left px-4 py-2 hover:bg-gray-100 flex items-center gap-3 text-sm">
                        <span class="material-icons-outlined text-gray-500">create_new_folder</span> Folder baru
                    </button>
                    <hr class="my-1 border-gray-200">
                    <label class="w-full text-left px-4 py-2 hover:bg-gray-100 flex items-center gap-3 text-sm cursor-pointer">
                        <span class="material-icons-outlined text-gray-500">upload_file</span> Upload file
                        <input type="file" id="fileInput" multiple onchange="uploadFiles()" class="hidden">
                    </label>
                </div>
            </div>

            <nav class="flex flex-col gap-1 mt-2">
                <button onclick="navigateToRoot()" class="flex items-center gap-3 px-4 py-2 rounded-full text-sm font-medium bg-blue-100 text-blue-800">
                    <span class="material-icons-outlined">folder_shared</span> Drive Saya
                </button>
            </nav>
        </aside>

        <main class="flex-1 p-6 overflow-y-auto flex flex-col gap-6">
            
            <div class="flex items-center justify-between">
                <div id="breadcrumbContainer" class="text-lg font-medium text-gray-700 flex items-center gap-2 flex-wrap select-none">
                    </div>
            </div>

            <div id="mainContent" class="flex flex-col gap-6">
                <div>
                    <h3 class="text-sm font-medium text-gray-500 mb-3">Folder</h3>
                    <div id="folderGrid" class="grid grid-cols-1 sm:grid-cols-4 gap-4"></div>
                </div>

                <div>
                    <h3 class="text-sm font-medium text-gray-500 mb-3">File</h3>
                    <div id="fileGrid" class="grid grid-cols-1 sm:grid-cols-4 gap-4"></div>
                </div>
            </div>
        </main>
    </div>

    <div id="previewModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50 animate-fade-in" onclick="closePreviewModal()">
        <div class="absolute top-4 right-4 flex items-center gap-4 z-50">
            <span id="modalFileName" class="text-white text-sm font-medium truncate max-w-xs">Nama Berkas</span>
            <button onclick="closePreviewModal()" class="text-gray-300 hover:text-white p-2 rounded-full hover:bg-white/10 transition">
                <span class="material-icons-outlined text-2xl">close</span>
            </button>
        </div>
        <div class="w-full max-w-4xl max-h-[85vh] p-4 flex items-center justify-center" onclick="event.stopPropagation()">
            <div id="modalContentContainer" class="w-full h-full flex items-center justify-center">
                </div>
        </div>
    </div>

    <div id="uxLoading" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center z-50">
        <div class="bg-white px-6 py-5 rounded-xl shadow-2xl flex flex-col items-center gap-3 max-w-xs text-center">
            <div class="w-10 h-10 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="text-sm font-medium text-gray-700">Memproses data ke Cloud MinIO...</p>
        </div>
    </div>

    <div id="toast" class="hidden fixed bottom-5 right-5 bg-gray-900 text-white px-4 py-3 rounded-xl shadow-xl text-sm z-50 flex items-center gap-2 transition-all duration-300 transform translate-y-10 opacity-0">
        <span class="material-icons-outlined text-green-400 text-base">check_circle</span>
        <span id="toastMessage">Aksi berhasil!</span>
    </div>

    <script>
        const API_URL = 'http://10.20.3.232:3000/api';
        
        let currentFolderId = null;
        let allFolders = [];
        let breadcrumbStack = [];

        function toggleNewMenu() {
            const el = document.getElementById('newMenuDropdown');
            el.classList.toggle('hidden');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const msg = document.getElementById('toastMessage');
            msg.innerText = message;
            
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.remove('translate-y-10', 'opacity-0');
            }, 10);
            
            setTimeout(() => {
                toast.classList.add('translate-y-10', 'opacity-0');
                setTimeout(() => toast.classList.add('hidden'), 300);
            }, 3000);
        }

        // BREADCRUMB
        function updateBreadcrumb() {
            const container = document.getElementById('breadcrumbContainer');
            let html = `<span class="cursor-pointer hover:underline text-blue-600 text-sm font-semibold" onclick="navigateToBreadcrumb(-1)">Drive Saya</span>`;
            
            breadcrumbStack.forEach((folder, index) => {
                html += `
                    <span class="text-gray-400 text-xs font-normal mx-1">></span>
                    <span class="cursor-pointer hover:underline text-gray-700 text-sm font-medium max-w-[150px] truncate" 
                          title="${folder.name}" 
                          onclick="navigateToBreadcrumb(${index})">
                        ${folder.name}
                    </span>
                `;
            });
            container.innerHTML = html;
        }

        function navigateToBreadcrumb(index) {
            if (index === -1) {
                breadcrumbStack = [];
                currentFolderId = null;
            } else {
                currentFolderId = breadcrumbStack[index].id;
                breadcrumbStack = breadcrumbStack.slice(0, index + 1);
            }
            document.getElementById('searchInput').value = ''; 
            updateBreadcrumb();
            loadContent();
        }

        // LOAD DATA
        async function loadContent(searchQuery = '') {
            try {
                const resFolders = await fetch(`${API_URL}/all-folders`);
                allFolders = await resFolders.json();

                let url = searchQuery 
                    ? `${API_URL}/folders?search=${encodeURIComponent(searchQuery)}` 
                    : `${API_URL}/folders?parentId=${currentFolderId || 'root'}`;

                const response = await fetch(url);
                const data = await response.json();

                renderFolders(data.folders || []);
                renderFiles(data.files || []);
            } catch (e) { console.error("Gagal load data: ", e); }
        }

        function renderFolders(folders) {
            const grid = document.getElementById('folderGrid');
            if (folders.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-4 flex flex-col items-center justify-center p-6 bg-gray-50 border border-dashed border-gray-200 rounded-xl text-gray-400">
                        <span class="material-icons-outlined text-3xl mb-1">folder_open</span>
                        <p class="text-xs">Tidak ada folder di direktori ini</p>
                    </div>`;
                return;
            }
            
            grid.innerHTML = '';
            folders.forEach(f => {
                let options = `<option value="">Pindah ke...</option><option value="root">Root</option>`;
                allFolders.forEach(folderOpt => {
                    if (folderOpt.id !== f.id) {
                        options += `<option value="${folderOpt.id}">${folderOpt.name}</option>`;
                    }
                });

                grid.innerHTML += `
                    <div class="bg-white border border-gray-200 rounded-xl p-4 flex items-center justify-between hover:bg-gray-50 hover:shadow-sm cursor-pointer group transition h-16 relative" onclick="enterFolder(${f.id}, '${f.name}')">
                        <div class="flex items-center gap-3 truncate w-full pr-6">
                            <span class="material-icons-outlined text-yellow-500 text-2xl flex-shrink-0">folder</span>
                            <span class="text-sm font-medium text-gray-700 truncate">${f.name}</span>
                        </div>
                        
                        <div class="relative flex-shrink-0" onclick="event.stopPropagation()">
                            <button onclick="toggleActionMenu('folder', ${f.id}, event)" class="text-gray-400 hover:text-gray-700 p-1 rounded-full hover:bg-gray-100 transition">
                                <span class="material-icons-outlined text-lg">more_vert</span>
                            </button>
                            
                            <div id="dropdown-folder-${f.id}" class="hidden dropdown-menu absolute right-0 mt-1 w-44 bg-white border border-gray-200 rounded-lg shadow-lg py-1 z-30">
                                <button onclick="renameItem('folder', ${f.id}, '${f.name}')" class="w-full text-left px-3 py-1.5 hover:bg-gray-100 flex items-center gap-2 text-xs text-gray-700">
                                    <span class="material-icons-outlined text-sm text-gray-500">edit</span> Ganti nama
                                </button>
                                <div class="px-3 py-1 hover:bg-gray-100 flex flex-col gap-0.5">
                                    <div class="flex items-center gap-2 text-xs text-gray-700 select-none">
                                        <span class="material-icons-outlined text-sm text-gray-500">drive_file_move</span> Pindah lokasi
                                    </div>
                                    <select onchange="moveItem('folder', ${f.id}, this.value)" class="text-[10px] border border-gray-200 rounded px-1 py-0.5 bg-white text-gray-500 w-full mt-1 outline-none">
                                        ${options}
                                    </select>
                                </div>
                                <hr class="my-1 border-gray-100">
                                <button onclick="deleteItem('folder', ${f.id})" class="w-full text-left px-3 py-1.5 hover:bg-gray-100 flex items-center gap-2 text-xs text-red-600 font-medium">
                                    <span class="material-icons-outlined text-sm text-red-500">delete</span> Hapus
                                </button>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function renderFiles(files) {
            const grid = document.getElementById('fileGrid');
            if (files.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-4 flex flex-col items-center justify-center p-8 bg-gray-50 border border-dashed border-gray-200 rounded-xl text-gray-400">
                        <span class="material-icons-outlined text-3xl mb-1">cloud_upload</span>
                        <p class="text-xs">Tidak ada berkas. Klik tombol Baru untuk mengunggah.</p>
                    </div>`;
                return;
            }

            grid.innerHTML = '';
            files.forEach(file => {
                const isImg = file.mime_type && file.mime_type.startsWith('image/');
                const isVideo = file.mime_type && file.mime_type.startsWith('video/');

                let previewCardHtml = '';
                
                // Perubahan di sini: Mengganti window.open dengan openPreviewModal bawaan local modal
                if (isImg) {
                    previewCardHtml = `<img src="${API_URL}/view/${file.minio_key}" class="w-full h-24 object-cover rounded-md border border-gray-100 group-hover:opacity-90 cursor-zoom-in" onclick="openPreviewModal('${file.name}', '${file.mime_type}', '${file.minio_key}')">`;
                } else if (isVideo) {
                    previewCardHtml = `
                        <div class="relative w-full h-24 bg-black rounded-md overflow-hidden group/vid border border-gray-100 cursor-pointer" onclick="openPreviewModal('${file.name}', '${file.mime_type}', '${file.minio_key}')">
                            <video src="${API_URL}/view/${file.minio_key}" class="w-full h-full object-cover opacity-60" preload="metadata"></video>
                            <div class="absolute inset-0 flex items-center justify-center bg-black/10 group-hover/vid:bg-black/40 transition">
                                <span class="material-icons-outlined text-white text-3xl opacity-90 group-hover/vid:scale-110 transition-all">play_circle_outline</span>
                            </div>
                        </div>`;
                } else {
                    previewCardHtml = `<div class="w-full h-24 bg-gray-50 rounded-md flex items-center justify-center border border-gray-100 cursor-zoom-in" onclick="openPreviewModal('${file.name}', '${file.mime_type}', '${file.minio_key}')"><span class="material-icons-outlined text-3xl text-gray-400">description</span></div>`;
                }

                let options = `<option value="">Pindah ke...</option><option value="root">Root</option>`;
                allFolders.forEach(folderOpt => { options += `<option value="${folderOpt.id}">${folderOpt.name}</option>`; });

                grid.innerHTML += `
                    <div class="bg-white border border-gray-200 rounded-xl p-3 flex flex-col justify-between hover:bg-gray-50 hover:shadow-sm group transition h-40 relative">
                        <div class="w-full mb-2">${previewCardHtml}</div>
                        
                        <div class="flex items-center justify-between w-full gap-2">
                            <span class="text-xs font-medium text-gray-600 truncate w-full cursor-zoom-in" title="${file.name}" onclick="openPreviewModal('${file.name}', '${file.mime_type}', '${file.minio_key}')">${file.name}</span>
                            
                            <div class="relative flex-shrink-0" onclick="event.stopPropagation()">
                                <button onclick="toggleActionMenu('file', ${file.id}, event)" class="text-gray-400 hover:text-gray-700 p-0.5 rounded-full hover:bg-gray-100 transition">
                                    <span class="material-icons-outlined text-base">more_vert</span>
                                </button>
                                
                                <div id="dropdown-file-${file.id}" class="hidden dropdown-menu absolute right-0 mt-1 w-44 bg-white border border-gray-200 rounded-lg shadow-lg py-1 z-30">
                                    <button onclick="renameItem('file', ${file.id}, '${file.name}')" class="w-full text-left px-3 py-1.5 hover:bg-gray-100 flex items-center gap-2 text-xs text-gray-700">
                                        <span class="material-icons-outlined text-sm text-gray-500">edit</span> Ganti nama
                                    </button>
                                    <div class="px-3 py-1 hover:bg-gray-100 flex flex-col gap-0.5">
                                        <div class="flex items-center gap-2 text-xs text-gray-700 select-none">
                                            <span class="material-icons-outlined text-sm text-gray-500">drive_file_move</span> Pindah lokasi
                                        </div>
                                        <select onchange="moveItem('file', ${file.id}, this.value)" class="text-[10px] border border-gray-200 rounded px-1 py-0.5 bg-white text-gray-500 w-full mt-1 outline-none">
                                            ${options}
                                        </select>
                                    </div>
                                    <hr class="my-1 border-gray-100">
                                    <button onclick="deleteItem('file', ${file.id})" class="w-full text-left px-3 py-1.5 hover:bg-gray-100 flex items-center gap-2 text-xs text-red-600 font-medium">
                                        <span class="material-icons-outlined text-sm text-red-500">delete</span> Hapus
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>`;
            });
        }

        // FUNGSI UNTUK LOGIKA PRATINJAU MODAL DALAM SATU TAB
        function openPreviewModal(name, mimeType, minioKey) {
            const modal = document.getElementById('previewModal');
            const titleEl = document.getElementById('modalFileName');
            const container = document.getElementById('modalContentContainer');
            const fileUrl = `${API_URL}/view/${minioKey}`;
            
            titleEl.innerText = name;
            container.innerHTML = ''; // bersihkan konten sebelumnya

            if (mimeType && mimeType.startsWith('image/')) {
                container.innerHTML = `<img src="${fileUrl}" class="max-w-full max-h-[75vh] object-contain rounded-md shadow-2xl">`;
            } else if (mimeType && mimeType.startsWith('video/')) {
                container.innerHTML = `<video src="${fileUrl}" controls autoplay class="max-w-full max-h-[75vh] rounded-md shadow-2xl bg-black"></video>`;
            } else if (mimeType && mimeType === 'application/pdf') {
                container.innerHTML = `<iframe src="${fileUrl}" class="w-full h-[75vh] rounded-md shadow-2xl bg-white" frameborder="0"></iframe>`;
            } else {
                // Untuk file teks biasa atau format file umum lainnya
                container.innerHTML = `
                    <div class="bg-white/10 backdrop-blur-md border border-white/20 p-8 rounded-2xl flex flex-col items-center gap-4 text-center text-white max-w-sm">
                        <span class="material-icons-outlined text-5xl">description</span>
                        <div>
                            <p class="font-medium text-sm truncate max-w-[250px]">${name}</p>
                            <p class="text-xs text-gray-400 mt-1">Pratinjau tidak tersedia untuk format ini</p>
                        </div>
                        <a href="${API_URL}/view/${minioKey}" target="_blank" class="mt-2 bg-blue-600 hover:bg-blue-700 text-white font-medium text-xs px-4 py-2 rounded-full transition shadow-md">
                            Unduh File
                        </a>
                    </div>`;
            }
            modal.classList.remove('hidden');
        }

        function closePreviewModal() {
            const modal = document.getElementById('previewModal');
            const container = document.getElementById('modalContentContainer');
            container.innerHTML = ''; // matikan streaming video atau memori berkas saat ditutup
            modal.classList.add('hidden');
        }

        // TOGGLE DROPDOWN CONTROLLER
        function toggleActionMenu(type, id, event) {
            document.querySelectorAll('.dropdown-menu').forEach(el => {
                if(el.id !== `dropdown-${type}-${id}`) {
                    el.classList.add('hidden');
                }
            });
            const targetDropdown = document.getElementById(`dropdown-${type}-${id}`);
            targetDropdown.classList.toggle('hidden');
        }

        window.addEventListener('click', function(e) {
            if (!e.target.closest('.relative')) {
                document.querySelectorAll('.dropdown-menu').forEach(el => el.classList.add('hidden'));
            }
        });

        // ACTIONS (CREATE FOLDER, UPLOAD, RENAME, MOVE, DELETE, SEARCH)
        async function triggerCreateFolder() {
            toggleNewMenu();
            const name = prompt("Masukkan nama folder baru:");
            if (!name || !name.trim()) return;
            const loading = document.getElementById('uxLoading');
            loading.classList.remove('hidden');
            try {
                await fetch(`${API_URL}/folders`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: name, parentId: currentFolderId })
                });
                await loadContent();
                showToast("Folder baru sukses dibuat! 📁");
            } catch (e) { console.error(e); } finally { loading.classList.add('hidden'); }
        }

        async function uploadFiles() {
            toggleNewMenu();
            const input = document.getElementById('fileInput');
            if (input.files.length === 0) return;
            const loading = document.getElementById('uxLoading');
            loading.classList.remove('hidden');
            const formData = new FormData();
            formData.append('folderId', currentFolderId || 'root');
            for (let i = 0; i < input.files.length; i++) { formData.append('files', input.files[i]); }
            try {
                await fetch(`${API_URL}/upload`, { method: 'POST', body: formData });
                input.value = '';
                await loadContent();
                showToast("Berkas berhasil diupload! 🚀");
            } catch (e) { console.error(e); } finally { loading.classList.add('hidden'); }
        }

        async function renameItem(type, id, oldName) {
            const name = prompt(`Ubah nama menjadi:`, oldName);
            if (!name || !name.trim() || name === oldName) return;
            const loading = document.getElementById('uxLoading');
            loading.classList.remove('hidden');
            try {
                await fetch(`${API_URL}/rename`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, id, name })
                });
                await loadContent();
                showToast("Item berhasil diganti nama! ✏️");
            } catch (e) { console.error(e); } finally { loading.classList.add('hidden'); }
        }

        async function moveItem(type, id, targetFolderId) {
            if (!targetFolderId) return;
            const loading = document.getElementById('uxLoading');
            loading.classList.remove('hidden');
            try {
                await fetch(`${API_URL}/move`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ type, id, targetFolderId })
                });
                await loadContent();
                showToast("Item berhasil dipindahkan lokasi! 🚚");
            } catch (e) { console.error(e); } finally { loading.classList.add('hidden'); }
        }

        async function deleteItem(type, id) {
            if (!confirm(`Hapus ${type} ini secara permanen dari server?`)) return;
            const loading = document.getElementById('uxLoading');
            loading.classList.remove('hidden');
            try {
                const endpoint = type === 'folder' ? `${API_URL}/folders/${id}` : `${API_URL}/files/${id}`;
                await fetch(endpoint, { method: 'DELETE' });
                await loadContent();
                showToast("Item berhasil dihapus permanen! 🗑️");
            } catch (e) { console.error(e); } finally { loading.classList.add('hidden'); }
        }

        function handleSearch(val) { loadContent(val.trim()); }

        function enterFolder(id, name) {
            const exists = breadcrumbStack.some(folder => folder.id === id);
            if (!exists) { breadcrumbStack.push({ id: id, name: name }); }
            currentFolderId = id;
            updateBreadcrumb();
            loadContent();
        }

        function navigateToRoot() {
            breadcrumbStack = [];
            currentFolderId = null;
            document.getElementById('searchInput').value = '';
            updateBreadcrumb();
            loadContent();
        }

        updateBreadcrumb();
        loadContent();
    </script>
</body>
</html>
