version: '3.8'

services:
  minio:
    image: minio/minio
    container_name: google_drive_minio_v2
    ports:
      - "9010:9000"
      - "9011:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    volumes:
      - minio_drive_data:/data
    command: server /data --console-address ":9001"

volumes:
  minio_drive_data: